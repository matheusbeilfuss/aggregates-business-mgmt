server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- API proxy ----------
    # Strips /api prefix and forwards to backend.
    # Example: /api/clients  ->  http://backend:8080/clients
    location /api/ {
        proxy_pass http://backend:8080/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Needed for file uploads
        client_max_body_size 10M;
    }

    # ---------- Static assets ----------
    # Cache JS/CSS/images aggressively (Vite uses content hashes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---------- SPA fallback ----------
    # Any route that isn't a file -> serve index.html (React Router handles it)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
