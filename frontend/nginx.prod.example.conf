# ---------- Block direct IP access ----------
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    return 444;
}

# ---------- HTTP -> HTTPS redirect ----------
server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# ---------- Main HTTPS server ----------
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # ---------- API proxy ----------
    # Strips /api prefix and forwards to backend.
    # Example: /api/clients  ->  http://backend:8080/clients
    location /api/ {
        proxy_pass http://backend:8080/;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Needed for file uploads
        client_max_body_size 10M;
    }

    # ---------- Static assets ----------
    # Cache JS/CSS/images aggressively (Vite uses content hashes)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---------- SPA fallback ----------
    # Any route that isn't a file -> serve index.html (React Router handles it)
    location / {
        try_files $uri $uri/ /index.html;
    }
}