spring.application.name=aggregare
spring.output.ansi.enabled=always
spring.profiles.active=test
spring.jpa.open-in-view=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

api.security.jwt.secret=${JWT_SECRET}
api.security.jwt.expiration=${JWT_EXPIRATION}
api.security.cookie.secure=${COOKIE_SECURE:true}
api.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

admin.initial-username=${ADMIN_INITIAL_USERNAME}
admin.initial-password=${ADMIN_INITIAL_PASSWORD}
