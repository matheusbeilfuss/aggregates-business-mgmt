# Application
spring.application.name=abm
spring.output.ansi.enabled=always
spring.profiles.active=test
spring.jpa.open-in-view=true

# Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Security
api.security.jwt.secret=${JWT_SECRET}
api.security.jwt.expiration=${JWT_EXPIRATION}
api.security.cookie.secure=${COOKIE_SECURE:true}
api.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Initial admin credentials
admin.initial-username=${ADMIN_INITIAL_USERNAME:}
admin.initial-password=${ADMIN_INITIAL_PASSWORD:}

# Flyway (disabled by default; enabled in dev/prod via profile-specific overrides)
spring.flyway.enabled=false

# Actuator - expose only the health endpoint
management.endpoints.web.exposure.include=health
