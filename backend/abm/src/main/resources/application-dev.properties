# Datasource PostgreSQL (local values)
spring.datasource.url=jdbc:postgresql://localhost:5432/abm
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Security (local values)
api.security.jwt.secret=${JWT_SECRET}
api.security.jwt.expiration=2h
api.security.cookie.secure=false
api.cors.allowed-origins=http://localhost:5173

# Initial admin credentials (local values)
admin.initial-username=${ADMIN_INITIAL_USERNAME}
admin.initial-password=${ADMIN_INITIAL_PASSWORD}
