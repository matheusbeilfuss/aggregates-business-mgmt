# Datasource H2
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security (local values)
api.security.jwt.secret=${JWT_SECRET}
api.security.jwt.expiration=2h
api.security.cookie.secure=false
api.cors.allowed-origins=http://localhost:5173

# Initial admin credentials (local values)
admin.initial-username=${ADMIN_INITIAL_USERNAME}
admin.initial-password=${ADMIN_INITIAL_PASSWORD}
