# Datasource H2
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Security (test-only values, not real secrets)
api.security.jwt.secret=dGVzdC1vbmx5LXNlY3JldC1rZXktZG8tbm90LXVzZS1pbi1wcm9k
api.security.jwt.expiration=2h
api.security.cookie.secure=false
api.cors.allowed-origins=http://localhost:5173

# Initial admin credentials (test-only)
admin.initial-username=admin
admin.initial-password=admin
