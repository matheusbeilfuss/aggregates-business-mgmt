services:
  # Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: abm
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # To access the database from the host (e.g. DBeaver), uncomment:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER} -d abm"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Backend
  # In production, replace 'build' with: image: ghcr.io/YOUR_GITHUB_USERNAME/abm-backend:latest
  backend:
    build: ./backend/abm
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -sf http://localhost:8080/actuator/health || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    environment:
      SPRING_PROFILES_ACTIVE: prod

      # Database
      DATABASE_URL: jdbc:postgresql://db:5432/abm
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}

      # Security
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-12h}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}

      # Initial admin
      ADMIN_INITIAL_USERNAME: ${ADMIN_INITIAL_USERNAME}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
    volumes:
      - uploads:/app/uploads
    expose:
      - "8080" # only visible to other containers (Nginx)

  # Frontend
  # In production, replace 'build' with: image: ghcr.io/YOUR_GITHUB_USERNAME/abm-frontend:latest
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api # baked into the JS bundle at build time
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80" # entry point for users
      # In production, also expose: "443:443"
    # In production, copy nginx.prod.example.conf to nginx.prod.conf, customize, and add:
    # volumes:
    #   - /etc/letsencrypt:/etc/letsencrypt:ro
    #   - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  uploads:
